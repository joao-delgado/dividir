<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Dividir por Dois</title>

    <!-- PWA: installable to the home screen. Offline is out of scope (no service
         worker), so this covers iOS "Add to Home Screen" and manual install on Android. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Status/title bar tint. Matches the app chrome: white in light, near-black in dark. -->
    <meta name="theme-color" content="#f4f4f0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2b2b22" media="(prefers-color-scheme: dark)" />

    <!-- iOS home-screen behavior (Safari ignores the manifest icons and display mode). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dividir por Dois" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
